<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCCQE1 — Ethics, Legal & Organizational | 100 MCQs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #4f8ef7;
    --accent2: #7c5af0;
    --green: #3ecf8e;
    --red: #f7615a;
    --yellow: #f7c948;
    --text: #e4e8f5;
    --muted: #7a82a0;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0d1526 0%, #1a0d2e 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 80% at 50% -10%, rgba(79,142,247,0.12) 0%, transparent 70%);
  }
  .header-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(79,142,247,0.4);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 14px;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 400;
    line-height: 1.2;
    position: relative;
  }
  .header h1 em {
    font-style: italic;
    color: #a08cff;
  }
  .header-sub {
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
    position: relative;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 18px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }
  .stat-pill span { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-pill strong { color: var(--text); }
  #score-val { color: var(--green); }
  #wrong-val { color: var(--red); }
  #remain-val { color: var(--yellow); }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 16px 24px 0;
  }
  .btn {
    padding: 9px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #3a7ae0; }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: rgba(247,97,90,0.1); }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 14px 24px 0;
  }
  .filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Outfit', sans-serif;
  }
  .filter-btn.active { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  /* QUESTIONS CONTAINER */
  .questions-wrap {
    max-width: 860px;
    margin: 28px auto 0;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .q-card.answered-correct { border-color: rgba(62,207,142,0.4); }
  .q-card.answered-wrong { border-color: rgba(247,97,90,0.3); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border);
  }
  .q-num {
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    margin-top: 2px;
  }
  .q-topic {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .q-text {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text);
    font-weight: 400;
  }

  .q-options {
    padding: 14px 22px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface2);
  }
  .option:hover:not(.disabled) { border-color: var(--accent); background: rgba(79,142,247,0.06); }
  .option.selected { border-color: var(--accent); background: rgba(79,142,247,0.1); }
  .option.correct { border-color: var(--green); background: rgba(62,207,142,0.08); }
  .option.incorrect { border-color: var(--red); background: rgba(247,97,90,0.08); }
  .option.disabled { cursor: default; }
  .option-letter {
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }
  .option.correct .option-letter { color: var(--green); border-color: var(--green); }
  .option.incorrect .option-letter { color: var(--red); border-color: var(--red); }
  .option.selected:not(.correct):not(.incorrect) .option-letter { color: var(--accent); border-color: var(--accent); }
  .option-text {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
  }

  .explanation {
    margin: 0 22px 18px;
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid rgba(79,142,247,0.25);
    background: rgba(79,142,247,0.05);
    font-size: 13.5px;
    line-height: 1.65;
    color: #b0bce0;
    display: none;
  }
  .explanation.visible { display: block; }
  .explanation strong { color: var(--accent); }

  .hidden { display: none !important; }

  /* RESULTS MODAL */
  #results-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #results-overlay.show { display: flex; }
  .results-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .results-box h2 { font-family: 'DM Serif Display', serif; font-size: 28px; font-weight: 400; margin-bottom: 8px; }
  .results-score {
    font-size: 64px;
    font-family: 'DM Serif Display', serif;
    line-height: 1;
    margin: 20px 0 8px;
  }
  .results-pct { color: var(--muted); font-size: 15px; margin-bottom: 24px; }
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .res-cell {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }
  .res-cell .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .res-cell .val { font-size: 22px; font-weight: 600; }
</style>

<body>

<div class="header">
  <div class="header-tag">MCCQE1 Prep · Advanced Difficulty</div>
  <h1>Ethics, Legal &amp; <em>Organizational</em> Medicine</h1>
  <p class="header-sub">100 High-Difficulty Multiple Choice Questions — Canadian Medical Law &amp; Ethics</p>
</div>

<div class="stats-bar">
  <div class="stat-pill"><span>Score</span> <strong id="score-val">0</strong></div>
  <div class="stat-pill"><span>Wrong</span> <strong id="wrong-val">0</strong></div>
  <div class="stat-pill"><span>Remaining</span> <strong id="remain-val">100</strong></div>
  <div class="stat-pill"><span>Accuracy</span> <strong id="acc-val">—</strong></div>
</div>

<div class="controls">
  <button class="btn primary" onclick="revealAll()">Reveal All Answers</button>
  <button class="btn" onclick="collapseAll()">Collapse Explanations</button>
  <button class="btn danger" onclick="resetQuiz()">Reset Quiz</button>
  <button class="btn" onclick="showResults()">See Final Score</button>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterQuestions('all', this)">All (100)</button>
  <button class="filter-btn" onclick="filterQuestions('unanswered', this)">Unanswered</button>
  <button class="filter-btn" onclick="filterQuestions('correct', this)">Correct</button>
  <button class="filter-btn" onclick="filterQuestions('wrong', this)">Incorrect</button>
</div>

<div class="questions-wrap" id="qwrap"></div>

<div id="results-overlay">
  <div class="results-box">
    <h2>Quiz Complete</h2>
    <div class="results-score" id="res-score-display"></div>
    <div class="results-pct" id="res-pct-display"></div>
    <div class="results-grid">
      <div class="res-cell"><div class="label">Correct</div><div class="val" style="color:var(--green)" id="res-correct"></div></div>
      <div class="res-cell"><div class="label">Wrong</div><div class="val" style="color:var(--red)" id="res-wrong"></div></div>
      <div class="res-cell"><div class="label">Skipped</div><div class="val" style="color:var(--yellow)" id="res-skip"></div></div>
    </div>
    <button class="btn primary" onclick="document.getElementById('results-overlay').classList.remove('show')">Close</button>
  </div>
</div>

<script>
const QUESTIONS = [
  // ── INFORMED CONSENT & CAPACITY ──────────────────────────────────────────
  {
    topic: "Informed Consent",
    q: "A 67-year-old man with moderate Alzheimer's disease presents to sign consent for an elective hip replacement. He can state the nature of the procedure but cannot explain what would happen if he declined surgery. He is accompanied by his adult son who holds a Continuing Power of Attorney for Property (but not Personal Care). What is the most appropriate next step?",
    opts: ["Proceed with consent from the son, as he holds POA","Assess the patient's capacity formally and, if incapacitated, identify a substitute decision-maker following provincial hierarchy","Accept the patient's stated wish to proceed as his expressed preference","Delay surgery until a court-appointed guardian is obtained","Contact the provincial capacity board immediately"],
    ans: 1,
    exp: "POA for Property does NOT authorize healthcare decisions. POA for Personal Care (or its equivalent) is required. The son cannot consent here. The physician must formally assess capacity using the ability to understand information AND appreciate consequences. If the patient lacks capacity, the provincial SDM hierarchy applies (spouse/partner → child → parent → sibling…). A court order is only needed if no SDM is available or there is disagreement."
  },
  {
    topic: "Informed Consent",
    q: "During consent for a laparoscopic cholecystectomy, a surgeon informs a patient of a 0.3% risk of common bile duct injury. The patient undergoes the procedure and suffers a bile duct injury. She later sues, claiming she was not warned. In Canadian law (following Reibl v. Hughes and the modified objective test), which statement is MOST accurate?",
    opts: ["The surgeon is not liable because disclosure of 0.3% risk meets the reasonable physician standard","Liability depends on whether a reasonable person in the patient's circumstances would have declined surgery had they known of the risk","The surgeon is liable only if the injury resulted from negligence in technique","Disclosure of any risk below 1% is not legally required","The patient must prove the surgeon acted below the standard of care in performing the procedure"],
    ans: 1,
    exp: "Canadian law (Reibl v. Hughes, 1980) uses a MODIFIED OBJECTIVE test: would a reasonable person in the patient's specific circumstances have refused surgery if properly warned? This departs from both the purely subjective test (what would THIS patient have done) and purely objective test (what would ANY patient do). Technical negligence is a separate inquiry. Threshold percentages do not determine disclosure — materiality to the patient does."
  },
  {
    topic: "Informed Consent",
    q: "A 15-year-old presents alone requesting oral contraceptives. She demonstrates full understanding of the risks, benefits, and alternatives, and her reasons are consistent and not influenced by a third party. Her parents are unaware of her request. Under the mature minor doctrine in most Canadian provinces, what is the correct approach?",
    opts: ["Refuse treatment and require parental consent as she is under 16","Prescribe and maintain confidentiality, as she meets criteria for mature minor status","Prescribe but notify parents within 24 hours as per mandatory reporting","Refer to psychiatry to assess maturity before prescribing","Prescribe only with written consent from one parent"],
    ans: 1,
    exp: "The mature minor doctrine (recognized across Canadian common law provinces) allows a minor with decision-making capacity to consent to treatment without parental involvement. Capacity criteria: understands the nature of the treatment and its consequences. There is no minimum age threshold — it is a functional test. Disclosing to parents without her consent would violate confidentiality unless there is a specific mandatory reporting obligation (which does not apply here)."
  },
  {
    topic: "Informed Consent",
    q: "During an emergency appendectomy under general anesthesia, the surgeon incidentally discovers a 4 cm ovarian cyst. The patient has previously expressed no preference about this scenario. Which action is MOST ethically and legally appropriate?",
    opts: ["Remove the cyst since it is clinically significant and the patient is already under anesthesia","Remove the cyst only if it appears malignant on gross inspection","Leave the cyst, close the abdomen, and discuss findings with the patient postoperatively","Consult gynecology intraoperatively for a decision","Proceed with removal given the principle of implied consent for emergencies"],
    ans: 2,
    exp: "The 'extension doctrine' allows intraoperative extension of a procedure ONLY when: (1) it is immediately life-threatening, AND (2) delaying would cause serious harm. An asymptomatic ovarian cyst does not meet this threshold. Implied consent covers the emergency that brought the patient to the OR (appendectomy), not elective additional procedures. The correct approach is to close and discuss. Delaying a cyst management decision does not cause immediate harm."
  },
  {
    topic: "Capacity Assessment",
    q: "A 78-year-old with early vascular dementia refuses a blood transfusion for a GI bleed. His Hgb is 58. He states: 'I don't want a blood transfusion because I am a Jehovah's Witness and it goes against my faith.' He cannot name the hospital or the date, but consistently articulates his religious objection and the consequence (he may die). The treating physician assesses him. What is the most legally sound conclusion?",
    opts: ["He lacks capacity because he cannot name the hospital or date, suggesting global cognitive impairment","He has capacity for THIS specific decision despite cognitive deficits, as he understands and appreciates its consequences in the context of his values","He lacks capacity because refusal in this context is irrational","His SDM should be consulted because dementia always negates capacity","A capacity board must be convened before any treatment decisions can be made"],
    ans: 1,
    exp: "Capacity is DECISION-SPECIFIC, not global. Inability to recall the date or orientation details does not automatically negate capacity for a specific healthcare decision. The test is: can he understand the relevant information AND appreciate how it applies to his situation? He clearly does — he understands he may die and links that to his religious values. This is a classic MCCQE1 trap: dementia ≠ incapacity. Courts have repeatedly upheld such refusals (Malette v. Shulman analogy). Treat capacity as a sliding scale — higher stakes require more rigorous assessment."
  },
  {
    topic: "Informed Consent",
    q: "A surgeon plans to operate on a patient's LEFT knee. In the operating room, the patient is draped and anesthetized. The circulating nurse notices the consent form says 'right knee.' The surgeon states he reviewed imaging and is certain the left knee is the correct site. What is the most appropriate action?",
    opts: ["Proceed with left knee surgery as the surgeon's clinical judgment supersedes an administrative error","Wake the patient and clarify the correct site before proceeding","Proceed and have the patient re-sign corrected consent in the recovery room","Continue if two team members verbally confirm the correct site","Proceed based on the imaging report which overrides the written consent"],
    ans: 1,
    exp: "Wrong-site surgery is a never event and a serious patient safety issue. Regardless of clinical certainty, surgery must STOP and the patient must be woken to confirm. The consent form is a legal document — discrepancies cannot be resolved intraoperatively by team consensus. This aligns with the WHO Surgical Safety Checklist and provincial patient safety frameworks. 'Surgeon's certainty' does not substitute for confirmed written consent."
  },
  {
    topic: "Substitute Decision Making",
    q: "A 55-year-old woman is intubated and sedated in the ICU following a massive stroke. Her husband (her SDM) refuses a recommended PEG tube, stating she 'would have wanted everything done.' The ICU team believes PEG insertion aligns with her current medical interests. Her husband, however, has no documentation of her wishes. Under the substituted judgment standard, what is the correct framework for the SDM's decision?",
    opts: ["The SDM must consent to any treatment the medical team considers beneficial","The SDM must make the decision the incapacitated person would have made based on prior expressed values, wishes, and beliefs","The SDM's personal beliefs take precedence when there is no advance directive","The SDM should choose the option least likely to result in death","A second SDM should be appointed given the conflict"],
    ans: 1,
    exp: "The gold standard for SDM decision-making in Canada is SUBSTITUTED JUDGMENT: what would the patient have decided? This is NOT about what the SDM wants or what is medically 'best.' The SDM must act on prior expressed wishes (verbal or written), known values, and cultural/religious beliefs. If no prior wishes are known, the SDM defaults to 'best interests.' The husband's statement 'would have wanted everything done' is a substituted judgment claim and must be evaluated against known evidence of her wishes. Conflict resolution resources (ethics consult, capacity board) are appropriate if needed."
  },
  {
    topic: "Advance Directives",
    q: "A 72-year-old man with COPD completed an advance directive 5 years ago stating 'no mechanical ventilation under any circumstances.' He now presents with a severe COPD exacerbation and is drowsy but arousable. He nods when asked if he wants to feel better. His daughter (SDM) insists on intubation. The advance directive was not updated after a mild MI last year. What governs here?",
    opts: ["The advance directive governs because it is the most recent written expression of his wishes","The SDM's decision governs because the patient's nodding represents a new contemporaneous expression overriding the directive","The advance directive governs only if the physician determines the current situation is exactly what the patient envisioned when signing it","The advance directive is invalidated by failure to update after a significant health event","The patient's current nodding constitutes valid consent for intubation and overrides the advance directive"],
    ans: 4,
    exp: "A key principle: if a CAPABLE patient makes a contemporaneous decision, it takes precedence over a prior advance directive. The patient is arousable and nodding — this may represent current capable expression of preference for treatment. Physicians must assess whether he currently has capacity. If he does, his current wishes control. If he does not, the advance directive guides the SDM. The failure to update after the MI does not automatically invalidate the directive — but the nodding raises a critical question about present capacity."
  },
  {
    topic: "Informed Consent",
    q: "A physician obtains verbal consent for a lumbar puncture, performs the procedure without incident, but forgets to document the consent discussion in the chart. The patient later develops post-LP headache and claims consent was never obtained. In a medicolegal context, what is the most accurate statement?",
    opts: ["Without written documentation, consent cannot be legally proven, and the physician is liable","Documentation of consent is important evidence, but verbal consent can still be valid if independently corroborated","Verbal consent is always sufficient for minor invasive procedures and documentation is optional","Undocumented consent constitutes battery regardless of whether the patient was actually informed","The burden of proof shifts entirely to the physician to prove consent occurred"],
    ans: 1,
    exp: "Consent itself is a PROCESS, not a piece of paper. Written documentation is not legally required for consent to be valid — but it is critical evidence. Verbal consent CAN be valid and enforceable if supported by contemporaneous notes, witnesses, or clinical records. However, the CMPA strongly recommends documentation. Lack of written consent does not automatically constitute battery (which requires absence of consent, not absence of documentation). The burden of proof in civil litigation typically rests with the plaintiff (patient)."
  },
  {
    topic: "Capacity Assessment",
    q: "During a psychiatric assessment, a physician uses the MacCAT-T to evaluate a patient's decision-making capacity. The patient scores well on 'Understanding' and 'Reasoning' but poorly on 'Appreciation.' Which conclusion is MOST clinically accurate?",
    opts: ["The patient has full capacity because understanding and reasoning are the most critical domains","The patient likely lacks capacity; inability to appreciate how information applies to their own situation is a fundamental incapacity criterion","The MacCAT-T is not validated for psychiatric patients and cannot guide capacity determination","Poor appreciation alone is insufficient to declare incapacity","The patient should be reassessed in 48 hours as appreciation scores fluctuate"],
    ans: 1,
    exp: "The MacCAT-T assesses four domains: Understanding, Appreciation, Reasoning, and Expressing a Choice. APPRECIATION is arguably the most clinically significant — it tests whether the patient can acknowledge how the information applies to THEIR OWN situation. A patient with a delusion that they don't actually have cancer may 'understand' that cancer is serious but fail appreciation. Poor appreciation strongly suggests lack of capacity and is a key differentiator in psychiatric populations. A formal capacity determination still requires clinical judgment beyond the score."
  },

  // ── CONFIDENTIALITY & MANDATORY REPORTING ─────────────────────────────────
  {
    topic: "Confidentiality",
    q: "A 35-year-old truck driver discloses to his family physician that he has been experiencing syncope episodes approximately once per week for the past month. He has not yet been investigated. He begs the physician not to report him as he will lose his livelihood. He has not had a syncopal episode while driving. What is the physician's MOST appropriate action?",
    opts: ["Maintain strict confidentiality as no accident has occurred","Report him immediately to the Ministry of Transportation as syncope is a mandatory reportable condition in most provinces","Investigate the syncope urgently and advise him to stop driving pending workup, with mandatory reporting if he refuses","Negotiate a voluntary cessation of driving agreement and avoid mandatory reporting if he complies","Refer to neurology and defer any reporting decision until a diagnosis is established"],
    ans: 2,
    exp: "Syncope in a commercial driver represents a serious, IMMEDIATE public safety risk. Most provinces have mandatory reporting obligations for physicians when a patient's medical condition impairs their ability to drive safely. Uncontrolled syncope is explicitly listed in most provincial motor vehicle legislation as a reportable condition. The standard approach: advise the patient to stop driving, explain your reporting obligation, attempt voluntary compliance first, but proceed with mandatory reporting if he refuses or if the risk is imminent. Simply waiting for a diagnosis without acting is inappropriate."
  },
  {
    topic: "Mandatory Reporting",
    q: "A 28-year-old woman discloses to her ER physician that her injuries (bruising on the arms, a cracked rib) were inflicted by her common-law partner, not a fall as she initially stated. She is cognitively intact, has no children at home, and explicitly asks the physician not to report or contact police. What is the most appropriate response?",
    opts: ["Call police immediately as this is an assault","Respect her autonomous refusal of police contact, provide safety resources, and document carefully","Report immediately under mandatory domestic violence reporting legislation applicable in all provinces","Admit her against her will for her safety","Consult social work and make reporting contingent on their assessment"],
    ans: 1,
    exp: "Critically: there is NO universal mandatory reporting law for domestic violence involving competent ADULTS in Canada. Unlike child abuse or gunshot wounds, spousal/partner abuse in a capable adult does NOT trigger mandatory reporting in most Canadian jurisdictions. The competent adult woman's autonomous decision NOT to involve police must be respected. The physician's role is: treat injuries, assess safety, provide resources (shelters, safety planning), document carefully, and ensure follow-up. Calling police without consent violates her autonomy and may even increase danger."
  },
  {
    topic: "Mandatory Reporting",
    q: "A physician treats a 19-year-old with a gunshot wound to the leg. The patient, fully alert and coherent, insists the wound was self-inflicted by accident while cleaning a firearm and begs the physician not to contact police. What is the most legally correct action in most Canadian provinces?",
    opts: ["Respect the patient's privacy and treat without reporting","Report to police as gunshot wounds are subject to mandatory reporting in most provinces regardless of patient wishes","Report only if the physician suspects the wound was inflicted by a third party","Report only if the injury is consistent with attempted homicide","Report only after obtaining explicit patient consent"],
    ans: 1,
    exp: "Gunshot wounds are subject to MANDATORY REPORTING to police in most Canadian provinces (e.g., Ontario's Gunshot Wounds Mandatory Reporting Act, 2005). This applies regardless of: (a) patient consent/refusal, (b) whether the wound was self-inflicted or inflicted by another, and (c) the clinical severity. Knife/stab wounds have variable reporting requirements by province. The patient's wishes do not override the mandatory statutory obligation. The physician should inform the patient of the reporting requirement."
  },
  {

let score = 0, wrong = 0;
const answered = {};

function buildQuiz() {
  const wrap = document.getElementById('qwrap');
  wrap.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `card-${i}`;
    const letters = ['A','B','C','D','E'];
    const optsHtml = q.opts.map((o, j) => `
      <div class="option" id="opt-${i}-${j}" onclick="selectAnswer(${i}, ${j})">
        <div class="option-letter">${letters[j]}</div>
        <div class="option-text">${o}</div>
      </div>`).join('');
    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">Q${i+1}</div>
        <div>
          <div class="q-topic">${q.topic}</div>
          <div class="q-text">${q.q}</div>
        </div>
      </div>
      <div class="q-options">${optsHtml}</div>
      <div class="explanation" id="exp-${i}">
        <strong>Explanation:</strong> ${q.exp}
      </div>`;
    wrap.appendChild(card);
  });
  updateStats();
}

function selectAnswer(qi, selected) {
  if (answered[qi] !== undefined) return;
  answered[qi] = selected;
  const correct = QUESTIONS[qi].ans;
  const card = document.getElementById(`card-${qi}`);
  const opts = card.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));
  opts[correct].classList.add('correct');
  if (selected === correct) {
    score++;
    card.classList.add('answered-correct');
  } else {
    opts[selected].classList.add('incorrect');
    wrong++;
    card.classList.add('answered-wrong');
  }
  document.getElementById(`exp-${qi}`).classList.add('visible');
  updateStats();
}

function updateStats() {
  const total = QUESTIONS.length;
  const done = Object.keys(answered).length;
  const remaining = total - done;
  const acc = done > 0 ? Math.round((score / done) * 100) : null;
  document.getElementById('score-val').textContent = score;
  document.getElementById('wrong-val').textContent = wrong;
  document.getElementById('remain-val').textContent = remaining;
  document.getElementById('acc-val').textContent = acc !== null ? acc + '%' : '—';
}

function revealAll() {
  QUESTIONS.forEach((q, i) => {
    if (answered[i] !== undefined) return;
    answered[i] = -1;
    const card = document.getElementById(`card-${i}`);
    const opts = card.querySelectorAll('.option');
    opts.forEach(o => o.classList.add('disabled'));
    opts[q.ans].classList.add('correct');
    document.getElementById(`exp-${i}`).classList.add('visible');
  });
  updateStats();
}

function collapseAll() {
  document.querySelectorAll('.explanation').forEach(e => e.classList.remove('visible'));
}

function resetQuiz() {
  score = 0; wrong = 0;
  for (const k in answered) delete answered[k];
  buildQuiz();
}

function showResults() {
  const total = QUESTIONS.length;
  const done = Object.keys(answered).length;
  const skipped = total - done;
  const pct = done > 0 ? Math.round((score / done) * 100) : 0;
  const color = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : 'var(--red)';
  document.getElementById('res-score-display').style.color = color;
  document.getElementById('res-score-display').textContent = `${score}/${done}`;
  document.getElementById('res-pct-display').textContent = `${pct}% accuracy on answered questions`;
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-skip').textContent = skipped;
  document.getElementById('results-overlay').classList.add('show');
}

function filterQuestions(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.q-card').forEach((card, i) => {
    const a = answered[i];
    if (type === 'all') card.classList.remove('hidden');
    else if (type === 'unanswered') card.classList.toggle('hidden', a !== undefined);
    else if (type === 'correct') card.classList.toggle('hidden', a !== QUESTIONS[i].ans);
    else if (type === 'wrong') card.classList.toggle('hidden', a === undefined || a === QUESTIONS[i].ans);
  });
}

buildQuiz();
</script>
