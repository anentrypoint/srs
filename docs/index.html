<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCCQE1 SRS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rippleui@1.12.1/dist/css/styles.css" />
  <style>
    :root {
      --bg-deep:    #0a0e1a;
      --bg-card:    #111827;
      --bg-card2:   #1a2235;
      --border:     rgba(255,255,255,0.07);
      --accent:     #3b82f6;
      --accent-glow:rgba(59,130,246,0.18);
      --success:    #22c55e;
      --warn:       #f59e0b;
      --danger:     #ef4444;
      --text1:      #f1f5f9;
      --text2:      #94a3b8;
      --text3:      #475569;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg-deep);
      color: var(--text1);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── layout shell ── */
    .shell {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(59,130,246,0.12) 0%, transparent 60%),
        var(--bg-deep);
    }

    .page { max-width: 780px; margin: 0 auto; padding: 2rem 1.25rem; }
    .page-wide { max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem; }

    /* ── glass card ── */
    .gcard {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(8px);
    }
    .gcard-inner {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    /* ── typography ── */
    .title { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text1); }
    .subtitle { font-size: 0.8125rem; color: var(--text2); margin-top: 2px; }
    .label-xs { font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); font-weight: 600; }
    .card-question { font-size: 1.0625rem; line-height: 1.7; color: var(--text1); white-space: pre-wrap; }
    .card-answer   { font-size: 0.9375rem; line-height: 1.65; color: var(--text1); white-space: pre-wrap; }
    .card-explain  { font-size: 0.875rem;  line-height: 1.65; color: var(--text2); white-space: pre-wrap; }

    /* ── stat tiles ── */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    @media (max-width: 540px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-tile {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      text-align: center;
    }
    .stat-tile .val { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
    .stat-tile .key { font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-top: 6px; font-weight: 600; }
    .stat-tile.hi .val { color: var(--accent); }

    /* ── progress bar ── */
    .prog-track {
      width: 100%; height: 8px; background: rgba(255,255,255,0.06);
      border-radius: 99px; overflow: hidden; position: relative;
    }
    .prog-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #3b82f6 0%, #818cf8 100%);
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 12px rgba(99,102,241,0.5);
    }
    .prog-track.thin { height: 3px; }

    /* ── primary action button ── */
    .btn-study {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 0.875rem 1.75rem; font-size: 1rem; font-weight: 600;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff; border: none; border-radius: 12px; cursor: pointer;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-study:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(99,102,241,0.5); }
    .btn-study:active { transform: translateY(0); }
    .btn-study.disabled { background: var(--bg-card2); color: var(--text3); box-shadow: none; cursor: default; }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.5rem 0.875rem; font-size: 0.875rem; font-weight: 500;
      background: transparent; color: var(--text2); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; transition: background 0.12s, color 0.12s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text1); }

    .btn-reveal {
      width: 100%; padding: 0.875rem; font-size: 0.9375rem; font-weight: 600;
      background: rgba(59,130,246,0.1); color: var(--accent);
      border: 1px solid rgba(59,130,246,0.25); border-radius: 12px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      letter-spacing: 0.01em;
    }
    .btn-reveal:hover { background: rgba(59,130,246,0.18); border-color: rgba(59,130,246,0.45); }

    /* ── score buttons ── */
    .score-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .score-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; padding: 0.625rem 0.25rem; border: 1px solid transparent;
      border-radius: 10px; cursor: pointer; transition: transform 0.12s, box-shadow 0.12s;
      font-weight: 600;
    }
    .score-btn:hover { transform: translateY(-2px); }
    .score-btn:active { transform: translateY(0); }
    .score-btn .num { font-size: 1.125rem; line-height: 1; }
    .score-btn .lbl { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.85; }
    .score-btn.s1 { background: rgba(239,68,68,0.15);  border-color: rgba(239,68,68,0.3);  color: #f87171; }
    .score-btn.s2 { background: rgba(239,68,68,0.1);   border-color: rgba(239,68,68,0.2);  color: #fca5a5; }
    .score-btn.s3 { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.25);color: #fbbf24; }
    .score-btn.s4 { background: rgba(34,197,94,0.1);   border-color: rgba(34,197,94,0.25); color: #4ade80; }
    .score-btn.s5 { background: rgba(34,197,94,0.15);  border-color: rgba(34,197,94,0.35); color: #22c55e; }
    .score-btn.s1:hover { box-shadow: 0 4px 16px rgba(239,68,68,0.3); }
    .score-btn.s2:hover { box-shadow: 0 4px 16px rgba(239,68,68,0.2); }
    .score-btn.s3:hover { box-shadow: 0 4px 16px rgba(245,158,11,0.3); }
    .score-btn.s4:hover { box-shadow: 0 4px 16px rgba(34,197,94,0.2); }
    .score-btn.s5:hover { box-shadow: 0 4px 16px rgba(34,197,94,0.35); }

    /* ── bloom badges ── */
    .badge-bloom {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 99px; font-size: 0.6875rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .bloom-recall  { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.25); }
    .bloom-apply   { background: rgba(59,130,246,0.12); color: #93c5fd; border: 1px solid rgba(59,130,246,0.25); }
    .bloom-analyze { background: rgba(168,85,247,0.12); color: #d8b4fe; border: 1px solid rgba(168,85,247,0.25); }
    .badge-topic {
      display: inline-flex; align-items: center;
      padding: 3px 9px; border-radius: 99px; font-size: 0.6875rem;
      font-weight: 500; font-family: 'SF Mono', 'Fira Code', monospace;
      background: rgba(255,255,255,0.05); color: var(--text2);
      border: 1px solid var(--border);
    }

    /* ── nav bar ── */
    .nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .nav-actions { display: flex; gap: 8px; }

    /* ── divider ── */
    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }

    /* ── table ── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .data-table th { text-align: left; padding: 10px 14px; color: var(--text3); font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.07em; border-bottom: 1px solid var(--border); }
    .data-table th.r { text-align: right; }
    .data-table td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .data-table td.r { text-align: right; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── topic grid ── */
    .topic-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    @media(max-width:600px) { .topic-grid { grid-template-columns: repeat(2,1fr); } }
    .topic-chip {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; gap: 8px;
    }
    .topic-chip .tid { font-family: 'SF Mono','Fira Code',monospace; font-size: 0.6875rem; color: var(--text2); }
    .topic-chip .cnt { font-size: 0.75rem; font-weight: 600; color: var(--text3); background: rgba(255,255,255,0.05); padding: 2px 7px; border-radius: 99px; }

    /* ── input ── */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); font-weight: 600; }
    .field input {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.625rem 0.875rem; color: var(--text1);
      font-size: 0.9375rem; outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: rgba(59,130,246,0.5); background: rgba(59,130,246,0.05); }

    /* ── session complete ── */
    .complete-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin: 1.5rem 0; }
    .complete-stat .v { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.03em; }
    .complete-stat .k { font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); font-weight: 600; margin-top: 4px; }

    /* ── animations ── */
    .fade-in { animation: fi 0.2s ease-out; }
    @keyframes fi { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── spinner ── */
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid rgba(59,130,246,0.2);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── rippleui overrides ── */
    .btn { border-radius: 10px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./app.js?v=3"></script>
</body>
</html>
